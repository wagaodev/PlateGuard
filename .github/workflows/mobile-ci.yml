name: Mobile CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'app-mobile/**'
      - '.github/workflows/mobile-ci.yml'

defaults:
  run:
    working-directory: app-mobile

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-mobile/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-mobile/package-lock.json

      - run: npm ci
      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

  android-build:
    name: Android APK
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            app-mobile/android/.gradle
          key: gradle-${{ hashFiles('app-mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Android Release APK
        working-directory: app-mobile/android
        run: ./gradlew assembleRelease --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: plateguard-android-${{ github.event.pull_request.number || github.sha }}
          path: app-mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Comentar no PR com link do artefato
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📱 **Android APK gerado com sucesso!**\n\nBaixe o artefato na aba "Artifacts" desta run: [Actions Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n> Build: \`${context.sha.substring(0, 7)}\``
            })
