name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'app-backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: app-backend

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-backend/package-lock.json

      - run: npm ci
      - run: npm run lint

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  test-unit:
    name: Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate

      - name: Rodar testes unitários
        run: npx jest --config '{"moduleFileExtensions":["js","json","ts"],"rootDir":"test","testEnvironment":"node","testRegex":"service.spec.ts$","transform":{"^.+.(t|j)s$":"ts-jest"}}' --no-cache --ci --coverage

      - name: Upload cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: app-backend/coverage/
          retention-days: 7

  test-e2e:
    name: Testes E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: "file:./data/plateguard.db"

      - run: npx prisma db seed
        env:
          DATABASE_URL: "file:./data/plateguard.db"

      - name: Rodar testes E2E
        run: npx jest --config test/jest-e2e.json --no-cache --ci
        env:
          DATABASE_URL: "file:./data/plateguard.db"
          NODE_ENV: test
          PORT: 3000
          THROTTLE_TTL: 60
          THROTTLE_LIMIT: 100

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, test-e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
