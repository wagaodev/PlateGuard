name: SonarCloud

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend: instala deps e roda testes com cobertura
      - name: Backend - Install
        working-directory: app-backend
        run: npm ci

      - name: Backend - Generate Prisma
        working-directory: app-backend
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./data/plateguard.db"

      - name: Backend - Testes com cobertura
        working-directory: app-backend
        run: |
          npx jest --config '{"moduleFileExtensions":["js","json","ts"],"rootDir":"test","testEnvironment":"node","testRegex":".spec.ts$","transform":{"^.+.(t|j)s$":"ts-jest"}}' --no-cache --ci --coverage --coverageDirectory=coverage
        env:
          DATABASE_URL: "file:./data/plateguard.db"

      # Mobile: instala deps
      - name: Mobile - Install
        working-directory: app-mobile
        run: npm ci

      # SonarCloud Scan (configuração lida do sonar-project.properties)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
