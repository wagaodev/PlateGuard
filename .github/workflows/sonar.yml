name: SonarCloud

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend: instala deps e roda testes com cobertura
      - name: Backend - Install
        working-directory: app-backend
        run: npm ci

      - name: Backend - Generate Prisma
        working-directory: app-backend
        run: npx prisma generate

      - name: Backend - Testes com cobertura
        working-directory: app-backend
        run: |
          npx jest --config '{"moduleFileExtensions":["js","json","ts"],"rootDir":"test","testEnvironment":"node","testRegex":"service.spec.ts$","transform":{"^.+.(t|j)s$":"ts-jest"}}' --no-cache --ci --coverage --coverageDirectory=coverage || true
        env:
          DATABASE_URL: "file:./data/plateguard.db"

      # Mobile: instala deps
      - name: Mobile - Install
        working-directory: app-mobile
        run: npm ci

      # SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=wagaodev
            -Dsonar.projectKey=wagaodev_PlateGuard
            -Dsonar.sources=app-backend/src,app-mobile/src
            -Dsonar.tests=app-backend/test
            -Dsonar.typescript.lcov.reportPaths=app-backend/coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/android/**,**/ios/**,**/*.spec.ts,**/generated/**
            -Dsonar.test.inclusions=**/*.spec.ts,**/*.e2e.spec.ts
