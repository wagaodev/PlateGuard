name: plate-guard

services:
  app-backend:
    container_name: app-backend
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=5001
      - DATABASE_URL=file:./data/plateguard.db
      - THROTTLE_TTL=60
      - THROTTLE_LIMIT=10
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
